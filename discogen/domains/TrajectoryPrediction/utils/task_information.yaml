optim_prompt: |-
  You should change the optimizer file, which can be found in `optim.py`. In deep learning, optimization is used to descend the gradient of a loss function with respect to the parameters of a neural network. Your task is to implement the `create_optimizer` function that takes a model and config dictionary, and returns an optimizer and learning rate scheduler. The optimizer controls how model weights are updated during training, while the scheduler adjusts the learning rate over time. You should not change the name of the function `create_optimizer` or its input/output signature.

loss_prompt: |-
  You should change the loss file, which can be found in `loss.py`. In trajectory prediction, the loss provides an objective to minimize for predicting future agent positions. Your task is to implement the `compute_loss` function that takes model predictions (multi-modal trajectories with uncertainty), ground truth trajectories, and validity masks, and returns a scalar loss value. The predictions include K trajectory modes with associated probabilities. You should not change the name of the function `compute_loss` or its input/output signature.

networks_prompt: |-
  You should change the network file, which can be found in `networks.py`. In trajectory prediction, the network encodes past agent trajectories and map features, then decodes multiple possible future trajectories. Your task is to implement the `TrajectoryPredictionModel` class with a `forward` method that takes a batch dictionary containing agent histories, map polylines, and masks, and returns a dictionary with 'predicted_trajectory' (shape [B, K, T, 5] with mean_x, mean_y, sigma_x, sigma_y, rho) and 'predicted_probability' (shape [B, K] mode probabilities). The model should handle social interactions between agents and incorporate road context. You should not change the name or interface of the `TrajectoryPredictionModel` class or its forward method signature.

train_prompt: |-
  You should change the train file, which can be found in `train.py`. The training loop is responsible for creating data loaders, initializing the model, running training and validation epochs, and tracking the best model. Your task is to implement the `train_model` function that takes training data, validation data, a config dictionary, and a device, and returns a tuple of (trained model, training history). The training history must be a dictionary with keys 'train_loss', 'val_loss', and 'lr', each mapping to a list of per-epoch values. You should use `create_optimizer` from `optim.py` for optimizer creation, `compute_loss` from `loss.py` for loss computation, and `TrajectoryPredictionModel` from `networks.py` for model creation. You should not change the name of the function `train_model` or its input/output signature. You must not print or log any scores or metrics; they are recorded via the returned history dict.
