name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: make check

  tests-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest tests --cov=discogen --cov-report=xml --junitxml=junit/test-results.xml
      - name: Check typing
        run: uv run mypy

      - name: Coverage Report Comment
        uses: MishaKav/pytest-coverage-comment@main
        if: always() && github.event_name == 'pull_request' && matrix.python-version == '3.12'
        with:
          pytest-xml-coverage-path: coverage.xml
          junitxml-path: junit/test-results.xml
          title: "Test Coverage Report"
          create-new-comment: false
          unique-id-for-comment: python-coverage
          xml-skip-covered: true
          report-only-changed-files: true

      - name: Check Coverage Threshold
        if: matrix.python-version == '3.12'
        run: |
          python -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib['line-rate'])
          threshold = 0.80
          if line_rate < threshold:
              print(f'❌ Coverage {line_rate*100:.1f}% is below threshold {threshold*100:.0f}%')
              sys.exit(1)
          else:
              print(f'✅ Coverage {line_rate*100:.1f}% meets threshold {threshold*100:.0f}%')
          "



  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Check if documentation can be built
        run: uv run mkdocs build -s
